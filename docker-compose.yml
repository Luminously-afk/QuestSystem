version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: it_quest
      DB_USER: itquest_user
      DB_PASS: itquest_pass
    depends_on:
      - db

  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: it_quest
      MARIADB_USER: itquest_user
      MARIADB_PASSWORD: itquest_pass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  db_data:
