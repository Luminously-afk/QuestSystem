<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Lexend:wght@400;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#5f5e5e",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#88da73",
                    "primary-fixed-dim": "#ebc23e",
                    "on-surface": "#1a1c1c",
                    "secondary-container": "#e2dfde",
                    "on-tertiary-container": "#1e6d12",
                    "surface-container-highest": "#e2e2e2",
                    "on-surface-variant": "#4d4634",
                    "on-secondary-fixed-variant": "#474746",
                    "secondary-fixed-dim": "#c8c6c5",
                    "primary-container": "#ffd54f",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#a3f78c",
                    "primary": "#735c00",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-tint": "#735c00",
                    "surface-container-high": "#e8e8e8",
                    "on-primary-fixed": "#241a00",
                    "background": "#f9f9f9",
                    "outline-variant": "#d0c6ae",
                    "outline": "#7f7662",
                    "on-primary-container": "#735c00",
                    "on-background": "#1a1c1c",
                    "tertiary-container": "#9aed83",
                    "surface-container-low": "#f4f3f3",
                    "surface": "#f9f9f9",
                    "on-secondary-fixed": "#1b1c1c",
                    "inverse-surface": "#2f3131",
                    "secondary-fixed": "#e5e2e1",
                    "inverse-primary": "#ebc23e",
                    "surface-dim": "#dadada",
                    "on-primary-fixed-variant": "#574500",
                    "tertiary": "#1e6d12",
                    "surface-bright": "#f9f9f9",
                    "error-container": "#ffdad6",
                    "surface-container": "#eeeeee",
                    "primary-fixed": "#ffe087",
                    "on-tertiary-fixed": "#012200",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary-fixed-variant": "#055300",
                    "on-secondary-container": "#636262",
                    "inverse-on-surface": "#f1f1f1"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "unit": "4px",
                    "lg": "32px",
                    "sm": "8px",
                    "md": "16px",
                    "margin": "24px",
                    "xl": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "h3": ["Press Start 2P"],
                    "body-md": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "label-pixel": ["Press Start 2P"],
                    "button-text": ["Press Start 2P"],
                    "h1": ["Press Start 2P"],
                    "h2": ["Press Start 2P"]
            },
            "fontSize": {
                    "h3": ["12px", {"lineHeight": "1.4", "letterSpacing": "0px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0px", "fontWeight": "400"}],
                    "label-pixel": ["10px", {"lineHeight": "1", "letterSpacing": "1px", "fontWeight": "400"}],
                    "button-text": ["12px", {"lineHeight": "1", "letterSpacing": "0px", "fontWeight": "400"}],
                    "h1": ["24px", {"lineHeight": "1.5", "letterSpacing": "0px", "fontWeight": "400"}],
                    "h2": ["18px", {"lineHeight": "1.4", "letterSpacing": "0px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .pixel-bg {
            background-color: #f9f9f9;
            background-image: radial-gradient(#d0c6ae 2px, transparent 2px);
            background-size: 32px 32px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hard-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .hard-shadow-sm {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .btn-press:active {
            transform: translate(4px, 4px);
            box-shadow: none !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="pixel-bg min-h-screen flex items-center justify-center p-margin">
<div class="max-w-md w-full">
<!-- Brand Header Section -->
<!-- Login Card -->
<main class="bg-white border-4 border-black hard-shadow p-lg relative overflow-hidden"><!-- Moved Brand Header -->
<div class="flex flex-col items-center mb-md mt-sm">
<div class="bg-primary-container p-sm border-2 border-black hard-shadow-sm mb-sm scale-75">
<span class="material-symbols-outlined text-black text-3xl" data-icon="videogame_asset">videogame_asset</span>
</div>
<h1 class="font-h1 text-[16px] text-on-surface text-center uppercase tracking-tighter">IT_QUEST</h1>
<p class="font-label-pixel text-[8px] text-secondary mt-xs uppercase tracking-widest">OLIVAREZ COLLEGE</p>
</div>
<!-- Decorative Corner Accents -->
<div class="absolute top-0 right-0 w-8 h-8 border-b-4 border-l-4 border-black"></div>
<header class="border-b-2 border-black pb-md mb-md">
<h2 class="font-h2 text-h2 text-black uppercase"><br></h2>
</header>
<form class="space-y-lg">
<!-- Username Field -->
<div class="space-y-sm">
<label class="font-label-pixel text-label-pixel text-black block uppercase" for="username">STUDENT NUMBER</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-4 border-black p-md font-body-md text-black focus:ring-0 focus:outline-none placeholder:text-outline-variant" id="username" name="username" placeholder="241C-1234" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<label class="font-label-pixel text-label-pixel text-black block uppercase" for="password">PASSWORD</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-4 border-black p-md font-body-md text-black focus:ring-0 focus:outline-none placeholder:text-outline-variant" id="password" name="password" placeholder="********" type="password">
</div>
</div>
<!-- Security Check Toggle (Pixel Style) -->
<div class="flex items-center gap-md">
<div class="relative flex items-center">
<input class="peer appearance-none w-6 h-6 border-4 border-black bg-white checked:bg-tertiary-container cursor-pointer" id="remember" type="checkbox">
<span class="absolute text-black pointer-events-none hidden peer-checked:block left-1 font-black">X</span>
</div>
<label class="font-label-pixel text-label-pixel text-black uppercase cursor-pointer" for="remember">REMEMBER ACCOUNT</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container border-4 border-black p-md hard-shadow-sm font-button-text text-button-text text-black uppercase tracking-widest btn-press transition-all duration-75 flex items-center justify-center gap-md group" type="submit">
<span class="">LOGIN</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<footer class="mt-xl pt-md border-t-2 border-dashed border-outline flex justify-between items-center">
<a class="font-label-pixel text-[8px] text-secondary hover:text-black uppercase" href="#">FORGOT_KEY?</a>
<a class="font-label-pixel text-[8px] text-secondary hover:text-black uppercase" href="#">REQUEST_ACCESS</a>
</footer>
</main>
<!-- Decorative UI Element -->
<div class="mt-lg flex justify-center gap-sm">
<div class="w-3 h-3 bg-black"></div>
<div class="w-3 h-3 bg-primary-container border-2 border-black"></div>
<div class="w-3 h-3 bg-tertiary-container border-2 border-black"></div>
<div class="w-3 h-3 bg-error border-2 border-black"></div>
</div>
<!-- System Status Overlay -->
<div class="mt-md text-center">
<p class="font-label-pixel text-[8px] text-outline uppercase tracking-tighter">SYSTEM STATUS: <span class="text-tertiary font-bold">ONLINE</span> // SERVER: IT_QUEST_01</p>
</div>
</div>
<!-- Background Decorative Elements -->


</body></html>
